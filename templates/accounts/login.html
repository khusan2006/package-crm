{% extends "base.html" %}
{% block title %}Kirish · Paket CRM{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="brand-big">📦 Paket CRM</div>
  <div class="card">
    <h1>Kirish</h1>
    {% if form.non_field_errors %}
      <div class="flash flash-error">{{ form.non_field_errors.0 }}</div>
    {% endif %}
    <form method="post" class="stacked">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Kirish</button>
    </form>
  </div>
</div>
{% endblock %}
