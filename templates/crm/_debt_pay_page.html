{% extends "base.html" %}
{% block title %}{{ title }} · Paket CRM{% endblock %}
{% block topbar_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px;">
  <p class="muted">Qoldiq: <strong style="color: var(--text);">{{ remaining|floatformat:"0g" }} so'm</strong></p>
  <form method="post" class="stacked">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">To'lash</button>
  </form>
</div>
{% endblock %}
