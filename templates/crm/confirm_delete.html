{% extends "base.html" %}
{% block title %}O'chirishni tasdiqlash · Paket CRM{% endblock %}
{% block content %}
<h1>“{{ object }}” o'chirilsinmi?</h1>
<div class="card">
  <p>Bu amalni qaytarib bo'lmaydi.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Ha, o'chirish</button>
    <a class="btn btn-ghost" style="color: var(--ink); border-color: var(--line);" href="{% url back %}">Bekor qilish</a>
  </form>
</div>
{% endblock %}
