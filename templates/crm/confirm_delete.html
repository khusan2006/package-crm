{% extends "base.html" %}
{% block title %}Confirm delete · Packaging CRM{% endblock %}
{% block content %}
<h1>Delete “{{ object }}”?</h1>
<div class="card">
  <p>This cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a class="btn btn-ghost" style="color: var(--ink); border-color: var(--line);" href="{% url back %}">Cancel</a>
  </form>
</div>
{% endblock %}
